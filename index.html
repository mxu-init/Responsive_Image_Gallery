<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/styles.css">
    <title>Responsive Image Gallery</title>
</head>

<body>

    <header class="header">
        <h1>Responsive Image Gallery</h1>

    </header>

    <main>

        <div class="gallery_container">

            <div class="gallery_item">

                <div class="image_container">
                    <img src="images/patagonia.png" alt="Montañas nevadas y escarpadas de la Patagonia reflejadas en un lago cristalino de aguas turquesas.">
                </div>

                <div class="image_description">
                    <p>Image description goes here.</p>
                </div>

            </div>

            <div class="gallery_item">

                <div class="image_container">
                    <img src="images/redWoodVallet.png" alt="Vista panorámica desde lo alto de un río que serpentea a través de un denso y verde bosque de secuoyas.">
                </div>

                <div class="image_description">
                    <p>Image description goes here.</p>
                </div>

            </div>

            <div class="gallery_item">

                <div class="image_container">
                    <img src="images/cornwallEngland.png" alt="Acantilados rocosos y praderas verdes sobre aguas marinas turquesas y transparentes en la costa de Cornualles.">
                </div>

                <div class="image_description">
                    <p>Image description goes here.</p>
                </div>

            </div>

            <div class="gallery_item">

                <div class="image_container">
                    <img src="images/provenceFrance.png" alt="Líneas simétricas de campos de lavanda en flor que guían la mirada hacia una pequeña casa rural al atardecer.">
                </div>

                <div class="image_description">
                    <p>Image description goes here.</p>
                </div>

            </div>

            <div class="gallery_item">

                <div class="image_container">
                    <img src="images/namibia.png" alt="Extensas dunas de arena rojiza en el desierto de Namibia bajo un impresionante cielo nocturno lleno de estrellas.">
                </div>

                <div class="image_description">
                    <p>Image description goes here.</p>
                </div>

            </div>

            <div class="gallery_item">

                <div class="image_container">
                    <img src="images/norway.png" alt="Un profundo fiordo noruego rodeado por altas y escarpadas montañas con picos parcialmente nevados.">
                </div>

                <div class="image_description">
                    <p>Image description goes here.</p>
                </div>

            </div>

            <div class="gallery_item">

                <div class="image_container">
                    <img src="images/hawaii.png" alt="Una gran cascada cayendo en una piscina natural en mitad de un exuberante y frondoso bosque tropical.">
                </div>

                <div class="image_description">
                    <p>Image description goes here.</p>
                </div>

            </div>

            <div class="gallery_item">

                <div class="image_container">
                    <img src="images/canyon.png" alt="Vista panorámica de la inmensidad de un gran cañón de roca rojiza bajo un cielo azul despejado.">
                </div>

                <div class="image_description">
                    <p>Image description goes here.</p>
                </div>

            </div>

        </div>

    </main>

    <footer>


    </footer>

    
</body>
</html>
